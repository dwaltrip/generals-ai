<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>generals.io timestep viewer — {{ REPLAY_ID }}</title>
<style>
  :root {
    --neutral-bg: {{ NEUTRAL_BG }};
    --mountain-bg: {{ MOUNTAIN_BG }};
    --tile-border: {{ TILE_BORDER }};
    --dead-bg: {{ DEAD_PLAYER_BG }};
    --event-log-bg: {{ EVENT_LOG_BG }};
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0; padding: 16px; background: #fafafa; color: #222;
  }
  header {
    display: flex; gap: 18px; align-items: baseline; margin-bottom: 12px;
  }
  header h1 { margin: 0; font-size: 1.15em; }
  header a { text-decoration: none; color: #06c; }
  header #step-readout { margin-left: auto; font-variant-numeric: tabular-nums; }
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 16px; align-items: start; }
  .board {
    display: grid; gap: 0;
    border: 1px solid var(--tile-border);
    width: max-content;
  }
  .tile {
    position: relative;
    width: 22px; height: 22px;
    border: 1px solid var(--tile-border);
    background: var(--neutral-bg);
    color: #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .tile.mountain { background: var(--mountain-bg); }
  .tile.owned { color: white; }
{{ SLOT_COLOR_RULES }}
  .tile .icon {
    position: absolute; inset: 2px;
    pointer-events: none;
    opacity: 0.85;
  }
  .tile .icon svg { width: 100%; height: 100%; display: block; }
  .tile .army { position: relative; z-index: 1; }
  .controls {
    display: flex; gap: 6px; align-items: center;
    margin-top: 10px; flex-wrap: wrap;
  }
  .controls button {
    padding: 5px 10px; border: 1px solid #ccc; background: white;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .controls button:hover { background: #f0f0f0; }
  .controls input { width: 70px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
  .controls .spacer { width: 12px; }
  .leaderboard table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .leaderboard th { background: white; padding: 6px 8px; border: 1px solid #ddd; text-align: left; }
  .leaderboard td { padding: 6px 8px; border: 1px solid #ddd; }
  .leaderboard td.player {
    color: white; font-weight: 600; min-width: 110px;
  }
  .leaderboard td.stat { background: white; font-variant-numeric: tabular-nums; }
  .leaderboard tr.dead td.player { opacity: 0.55; filter: grayscale(35%); }
  .leaderboard tr.dead td.stat { background: var(--dead-bg); color: #ccc; }
  .leaderboard .skull { margin-right: 6px; }
  #events {
    background: var(--event-log-bg); color: white;
    padding: 12px; margin-top: 16px; border-radius: 6px;
    max-height: 320px; overflow-y: auto;
    font-size: 13px;
  }
  .event {
    display: flex; gap: 6px; align-items: center;
    padding: 3px 0;
  }
  .event .swatch {
    display: inline-block; width: 12px; height: 12px;
    flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2);
  }
  .event .t { color: #888; margin-left: auto; font-variant-numeric: tabular-nums; }
  .event.win { font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>generals.io timestep viewer</h1>
  <span><code>{{ REPLAY_ID }}</code></span>
  <a href="https://generals.io/replays/{{ REPLAY_ID }}" target="_blank" rel="noopener">↗ open live viewer</a>
  <span id="step-readout"></span>
</header>

<!-- Hidden SVG defs — icons referenced via <use> from each tile -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-mountain" viewBox="0 0 100 100">{{ SVG_MOUNTAIN_INNER }}</symbol>
    <symbol id="i-crown" viewBox="0 0 100 100">{{ SVG_CROWN_INNER }}</symbol>
    <symbol id="i-city" viewBox="0 0 100 100">{{ SVG_CITY_INNER }}</symbol>
  </defs>
</svg>

<div class="layout">
  <div>
    <div id="board" class="board"></div>
    <div class="controls">
      <button data-step="-1">◀ −1</button>
      <button data-step="1">+1 ▶</button>
      <span class="spacer"></span>
      <button data-step="-25">−25</button>
      <button data-step="25">+25</button>
      <span class="spacer"></span>
      <button data-step="home">⏮ Home</button>
      <button data-step="end">End ⏭</button>
      <span class="spacer"></span>
      <label>jump: <input id="jump" type="number" min="0" /></label>
    </div>
  </div>

  <div class="leaderboard">
    <table>
      <thead><tr><th>Player</th><th>Army</th><th>Land</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>
</div>

<section id="events"></section>

<script>
const DATA = {{ DATA_JSON }};
const COLORS = {{ SLOT_COLORS_JSON }};

// ============================================================================
// Setup
// ============================================================================

const W = DATA.static.map_w;
const H = DATA.static.map_h;
const N = W * H;
const T_MAX = DATA.static.num_timesteps - 1;
const NUM_PLAYERS = DATA.static.usernames.length;

let t = 0;

// ============================================================================
// Decode + precompute
// ============================================================================

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function decodeSnapshot(snap) {
  return {
    ownership: new Int8Array(b64ToBytes(snap.o).buffer),
    armies: new Int16Array(b64ToBytes(snap.a).buffer),
  };
}

const SNAPS = DATA.snapshots.map(decodeSnapshot);

// Per-snapshot aggregates: army_total[p], tile_count[p]. Computed once so
// per-step render is O(N), not O(N × num_players).
function computeAggregates() {
  return SNAPS.map(({ ownership, armies }) => {
    const army = new Int32Array(NUM_PLAYERS);
    const tiles = new Int32Array(NUM_PLAYERS);
    for (let k = 0; k < N; k++) {
      const o = ownership[k];
      if (o >= 0) {
        army[o] += armies[k];
        tiles[o] += 1;
      }
    }
    return { army, tiles };
  });
}
const AGGREGATES = computeAggregates();

// Per-player "has eliminated someone by timestep t". Walks ui_events once
// to build a per-player list of capture-timesteps, then a step-change just
// checks if t is past any of them.
function computeFirstKillT() {
  const firstKillT = new Array(NUM_PLAYERS).fill(null);
  for (const e of DATA.ui_events) {
    if (e.kind === 'capture' && firstKillT[e.captor] === null) {
      firstKillT[e.captor] = e.t;
    }
  }
  return firstKillT;
}
const FIRST_KILL_T = computeFirstKillT();

// Static lookups
const MOUNTAINS_SET = new Set(DATA.static.mountains);
const INITIAL_CITIES_SET = new Set(DATA.static.initial_cities);
const GENERAL_TILE_TO_PLAYER = new Map();
DATA.static.initial_generals.forEach((tile, p) => {
  if (tile >= 0) GENERAL_TILE_TO_PLAYER.set(tile, p);
});

// ============================================================================
// Per-timestep derived state
// ============================================================================

function citySetAt(stepT) {
  const s = new Set(INITIAL_CITIES_SET);
  for (const b of DATA.city_births) {
    if (b.t > stepT) break;
    s.add(b.tile);
  }
  return s;
}

function isGeneralAt(tile, stepT) {
  const p = GENERAL_TILE_TO_PLAYER.get(tile);
  if (p === undefined) return false;
  const death = DATA.static.general_death_t[p];
  return death === null || stepT < death;
}

function isPlayerAlive(p, stepT) {
  if (DATA.static.initial_generals[p] < 0) return false;
  const death = DATA.static.general_death_t[p];
  return death === null || stepT < death;
}

function hasKillBy(p, stepT) {
  const k = FIRST_KILL_T[p];
  return k !== null && k <= stepT;
}

// ============================================================================
// DOM construction (run once)
// ============================================================================

function buildBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${W}, 22px)`;
  const cells = [];
  for (let i = 0; i < N; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const army = document.createElement('span');
    army.className = 'army';
    const icon = document.createElement('span');
    icon.className = 'icon';
    // empty <svg><use> placeholder — href flipped on per-step render
    icon.innerHTML = '<svg viewBox="0 0 100 100"><use href=""/></svg>';
    tile.appendChild(army);
    tile.appendChild(icon);
    board.appendChild(tile);
    cells.push(tile);
  }
  return cells;
}
const CELLS = buildBoard();

function buildLeaderboard() {
  const tbody = document.getElementById('lb-body');
  const rows = [];
  for (let p = 0; p < NUM_PLAYERS; p++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="player" style="background:${COLORS[p]}">
        <span class="skull"></span><span class="name"></span>
      </td>
      <td class="stat army"></td>
      <td class="stat land"></td>
    `;
    tr.querySelector('.name').textContent = DATA.static.usernames[p];
    tbody.appendChild(tr);
    rows.push(tr);
  }
  return rows;
}
const LB_ROWS = buildLeaderboard();

// ============================================================================
// Per-tile mutators
// ============================================================================

function setTileOwnership(tile, ownership) {
  // Reset to baseline classes, then set the slot or mountain marker
  tile.className = 'tile';
  if (ownership === -2) tile.classList.add('mountain');
  else if (ownership >= 0) {
    tile.classList.add('owned');
    tile.classList.add(`slot-${ownership}`);
  }
}

function setTileIcon(tile, kind) {
  const use = tile.querySelector('use');
  use.setAttribute('href', kind ? `#i-${kind}` : '');
}

function setTileArmy(tile, n) {
  tile.querySelector('.army').textContent = n > 0 ? String(n) : '';
}

// ============================================================================
// Render
// ============================================================================

function renderBoard(stepT) {
  const { ownership, armies } = SNAPS[stepT];
  const cities = citySetAt(stepT);
  for (let i = 0; i < N; i++) {
    const tile = CELLS[i];
    const o = ownership[i];
    setTileOwnership(tile, o);
    if (o === -2) {
      setTileIcon(tile, 'mountain');
      setTileArmy(tile, 0);
    } else if (isGeneralAt(i, stepT)) {
      setTileIcon(tile, 'crown');
      setTileArmy(tile, armies[i]);
    } else if (cities.has(i)) {
      setTileIcon(tile, 'city');
      setTileArmy(tile, armies[i]);
    } else {
      setTileIcon(tile, null);
      setTileArmy(tile, armies[i]);
    }
  }
}

function renderLeaderboard(stepT) {
  const { army, tiles } = AGGREGATES[stepT];
  for (let p = 0; p < NUM_PLAYERS; p++) {
    const row = LB_ROWS[p];
    row.classList.toggle('dead', !isPlayerAlive(p, stepT));
    row.querySelector('.army').textContent = army[p];
    row.querySelector('.land').textContent = tiles[p];
    row.querySelector('.skull').textContent = hasKillBy(p, stepT) ? '💀' : '';
  }
}

function renderEvents(stepT) {
  const root = document.getElementById('events');
  const evs = DATA.ui_events.filter(e => e.t <= stepT).reverse();
  root.innerHTML = evs.map(eventHTML).join('');
}

function eventHTML(e) {
  const u = DATA.static.usernames;
  const swatch = p => `<span class="swatch" style="background:${COLORS[p]}"></span>`;
  if (e.kind === 'capture') {
    return `<div class="event">${swatch(e.captor)}${escapeHtml(u[e.captor])} captured ${swatch(e.captured)}${escapeHtml(u[e.captured])}. <span class="t">${e.t}</span></div>`;
  }
  if (e.kind === 'surrender') {
    return `<div class="event">${swatch(e.player)}${escapeHtml(u[e.player])} surrendered. <span class="t">${e.t}</span></div>`;
  }
  if (e.kind === 'win') {
    return `<div class="event win">${swatch(e.player)}${escapeHtml(u[e.player])} wins! <span class="t">${e.t}</span></div>`;
  }
  return '';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderHeader(stepT) {
  document.getElementById('step-readout').textContent =
    `t = ${stepT}  (turn ${Math.floor(stepT / 2)})   /   t_max = ${T_MAX}`;
}

function render(stepT) {
  renderBoard(stepT);
  renderLeaderboard(stepT);
  renderEvents(stepT);
  renderHeader(stepT);
}

// ============================================================================
// Controls
// ============================================================================

function setStep(newT) {
  t = Math.max(0, Math.min(T_MAX, newT | 0));
  render(t);
  document.getElementById('jump').value = t;
}

document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.step;
    if (v === 'home') setStep(0);
    else if (v === 'end') setStep(T_MAX);
    else setStep(t + parseInt(v, 10));
  });
});

document.getElementById('jump').max = T_MAX;
document.getElementById('jump').addEventListener('change', e => {
  setStep(parseInt(e.target.value, 10) || 0);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case 'ArrowLeft':  setStep(t - 1);  e.preventDefault(); break;
    case 'ArrowRight': setStep(t + 1);  e.preventDefault(); break;
    case 'ArrowUp':    setStep(t - 25); e.preventDefault(); break;
    case 'ArrowDown':  setStep(t + 25); e.preventDefault(); break;
    case 'Home':       setStep(0);      e.preventDefault(); break;
    case 'End':        setStep(T_MAX);  e.preventDefault(); break;
  }
});

render(0);
</script>
</body>
</html>
