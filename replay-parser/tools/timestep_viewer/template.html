<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>$REPLAY_ID — timestep viewer</title>
<style>
  :root {
    --neutral-bg: $NEUTRAL_BG;
    --mountain-bg: $MOUNTAIN_BG;
    --neutral-city-bg: $NEUTRAL_CITY_BG;
    --tile-border: $TILE_BORDER;
    --dead-bg: $DEAD_PLAYER_BG;
    --event-log-bg: $EVENT_LOG_BG;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0; padding: 16px;
    height: 100vh;
    box-sizing: border-box;
    background: #333;
    color: #eee;
  }
  header {
    display: flex; gap: 18px; align-items: baseline; margin-bottom: 12px;
  }
  header h1 { margin: 0; font-size: 1.15em; }
  header a { text-decoration: none; color: #06c; }

  .layout {
    display: flex;
    flex-direction: row;
    align-items: start;
  }
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-left: 10px;
  }
  #step-readout {
    font-variant-numeric: tabular-nums; font-size: 14px;
    padding: 6px 10px; background: white; color: #222;
    border: 1px solid #ddd; border-radius: 4px;
  }

  .board {
    display: grid; gap: 1px;
    background: var(--tile-border);
    border: 1px solid var(--tile-border);
    width: max-content;
  }
  .tile {
    position: relative;
    width: var(--tile-size);
    height: var(--tile-size);
    background: var(--neutral-bg);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .tile.with-army {
    background: var(--neutral-city-bg);
  }
  .tile.mountain { background: var(--mountain-bg); }
  .tile.neutral-city { background: var(--neutral-city-bg); }
  .tile .icon {
    position: absolute; inset: 2px;
    pointer-events: none;
    opacity: 0.85;
  }
  .tile .icon svg { width: 100%; height: 100%; display: block; }
  .tile .army { position: relative; z-index: 1; }

  .controls {
    display: flex; gap: 6px; align-items: center;
    margin-top: 10px; flex-wrap: wrap;
  }
  .controls button {
    padding: 5px 10px; border: 1px solid #ccc; background: white; color: #222;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .controls button:hover { background: #f0f0f0; }
  .controls input {
    width: 50px; padding: 5px; border: 1px solid #ccc; background: white; color: #222;
    border-radius: 4px;
  }
  .controls .spacer { width: 12px; }

  .leaderboard { color: black; }
  .leaderboard table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .leaderboard th {
    background: white;
    padding: 6px 8px;
    border: 1px solid black;
    text-align: left;
  }
  .leaderboard td { padding: 6px 8px; border: 1px solid black; }
  .leaderboard td.player {
    color: white;
    font-weight: 600;
    min-width: 80px;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .leaderboard td.stat { background: white; font-variant-numeric: tabular-nums; }
  .leaderboard tr.dead td.player { opacity: 0.55; filter: grayscale(35%); }
  .leaderboard tr.dead td.stat { background: var(--dead-bg); color: #ccc; }
  .leaderboard .skull {
    font-size: 15px;
    margin-right: 10px;
    display: inline-block;
    width: 13px;
    margin-top: -2px;
    margin-bottom: -2px;
  }

  #events {
    background: var(--event-log-bg); color: white;
    padding: 12px; border-radius: 6px;
    max-height: 320px; overflow-y: auto;
    min-height: 80px;
    font-size: 13px;
  }
  .event {
    display: flex; gap: 6px; align-items: center;
    padding: 3px 0;
  }
  .event .swatch {
    display: inline-block; width: 12px; height: 12px;
    flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2);
  }
  .event .t { color: #888; margin-left: auto; font-variant-numeric: tabular-nums; }
  .event.win { font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>timestep viewer — <code>$REPLAY_ID</code></h1>
  <a href="https://generals.io/replays/$REPLAY_ID" target="_blank" rel="noopener">↗ open live viewer</a>
</header>

<!-- Hidden SVG defs — icons referenced via <use> from each tile -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-mountain" viewBox="0 0 100 100">$SVG_MOUNTAIN_INNER</symbol>
    <symbol id="i-crown" viewBox="0 0 100 100">$SVG_CROWN_INNER</symbol>
    <symbol id="i-city" viewBox="0 0 100 100">$SVG_CITY_INNER</symbol>
  </defs>
</svg>

<div class="layout">
  <div>
    <div id="board" class="board"></div>
    <div class="controls">
      <button data-step="-1">◀ −1</button>
      <button data-step="1">+1 ▶</button>
      <span class="spacer"></span>
      <button data-step="-25">−25</button>
      <button data-step="25">+25</button>
      <span class="spacer"></span>
      <button data-step="start">⏮ Start</button>
      <button data-step="end">End ⏭</button>
      <span class="spacer"></span>
      <label>jump: <input id="jump" type="number" min="0" /></label>
    </div>
  </div>

  <div class="right-col">
    <div id="step-readout"></div>
    <div class="leaderboard">
      <table>
        <thead><tr><th>Player</th><th>Army</th><th>Land</th></tr></thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
    <section id="events"></section>
  </div>
</div>

<script type="text/javascript">
const DATA = $DATA_JSON;
const COLORS = $SLOT_COLORS_JSON;
const TILE_SIZE = '20px';

window.document.documentElement.style.setProperty('--tile-size', TILE_SIZE);

const styleForColors = document.createElement('style');
styleForColors.textContent = `$SLOT_COLOR_RULES`;
document.head.appendChild(styleForColors);

// ============================================================================
// Setup
// ============================================================================

const W = DATA.static.map_w;
const H = DATA.static.map_h;
const N = W * H;
const T_MAX = DATA.static.num_timesteps - 1;
const NUM_PLAYERS = DATA.static.usernames.length;

let t = 0;

// ============================================================================
// Decode + precompute
// ============================================================================

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function decodeSnapshot(snap) {
  return {
    ownership: new Int8Array(b64ToBytes(snap.o).buffer),
    armies: new Int16Array(b64ToBytes(snap.a).buffer),
  };
}

const SNAPS = DATA.snapshots.map(decodeSnapshot);

// Per-snapshot aggregates: army_total[p], tile_count[p]. Computed once so
// per-step render is O(N), not O(N × num_players).
function computeAggregates() {
  return SNAPS.map(({ ownership, armies }) => {
    const army = new Int32Array(NUM_PLAYERS);
    const tiles = new Int32Array(NUM_PLAYERS);
    for (let k = 0; k < N; k++) {
      const o = ownership[k];
      if (o >= 0) {
        army[o] += armies[k];
        tiles[o] += 1;
      }
    }
    return { army, tiles };
  });
}
const AGGREGATES = computeAggregates();

// Per-player "has eliminated someone by timestep t". Walks ui_events once
// to build a per-player list of capture-timesteps, then a step-change just
// checks if t is past any of them.
function computeFirstKillT() {
  const firstKillT = new Array(NUM_PLAYERS).fill(null);
  for (const e of DATA.ui_events) {
    if (e.kind === 'capture' && firstKillT[e.captor] === null) {
      firstKillT[e.captor] = e.t;
    }
  }
  return firstKillT;
}
const FIRST_KILL_T = computeFirstKillT();

// Static lookups
const MOUNTAINS_SET = new Set(DATA.static.mountains);
const INITIAL_CITIES_SET = new Set(DATA.static.initial_cities);
const GENERAL_TILE_TO_PLAYER = new Map();
DATA.static.initial_generals.forEach((tile, p) => {
  if (tile >= 0) GENERAL_TILE_TO_PLAYER.set(tile, p);
});

// ============================================================================
// Per-timestep derived state
// ============================================================================

function citySetAt(stepT) {
  const s = new Set(INITIAL_CITIES_SET);
  for (const b of DATA.city_births) {
    if (b.t > stepT) break;
    s.add(b.tile);
  }
  return s;
}

function isGeneralAt(tile, stepT) {
  const p = GENERAL_TILE_TO_PLAYER.get(tile);
  if (p === undefined) return false;
  const death = DATA.static.general_death_t[p];
  return death === null || stepT < death;
}

function isPlayerAlive(p, stepT) {
  if (DATA.static.initial_generals[p] < 0) return false;
  const death = DATA.static.general_death_t[p];
  return death === null || stepT < death;
}

function hasKillBy(p, stepT) {
  const k = FIRST_KILL_T[p];
  return k !== null && k <= stepT;
}

// ============================================================================
// DOM construction (run once)
// ============================================================================

function buildBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${W}, ${TILE_SIZE})`;
  const cells = [];
  for (let i = 0; i < N; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const army = document.createElement('span');
    army.className = 'army';
    const icon = document.createElement('span');
    icon.className = 'icon';
    // empty <svg><use> placeholder — href flipped on per-step render
    icon.innerHTML = '<svg viewBox="0 0 100 100"><use href=""/></svg>';
    tile.appendChild(army);
    tile.appendChild(icon);
    board.appendChild(tile);
    cells.push(tile);
  }
  return cells;
}
const CELLS = buildBoard();

function buildLeaderboard() {
  const tbody = document.getElementById('lb-body');
  const rows = [];
  for (let p = 0; p < NUM_PLAYERS; p++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="player" style="background:${COLORS[p]}">
        <span class="skull"></span><span class="name"></span>
      </td>
      <td class="stat army"></td>
      <td class="stat land"></td>
    `;
    tr.querySelector('.name').textContent = DATA.static.usernames[p];
    tbody.appendChild(tr);
    rows.push(tr);
  }
  return rows;
}
const LB_ROWS = buildLeaderboard();

// ============================================================================
// Per-tile mutators
// ============================================================================

function setTileOwnership(tile, ownership) {
  // Reset to baseline classes, then set the slot or mountain marker
  tile.className = 'tile';
  if (ownership === -2) tile.classList.add('mountain');
  else if (ownership >= 0) {
    tile.classList.add('owned');
    tile.classList.add(`slot-${ownership}`);
  }
}

function setTileIcon(tile, kind) {
  const use = tile.querySelector('use');
  use.setAttribute('href', kind ? `#i-${kind}` : '');
}

function setTileArmy(tile, n) {
  tile.querySelector('.army').textContent = n > 0 ? String(n) : '';
}

// ============================================================================
// Render
// ============================================================================

function renderBoard(stepT) {
  const { ownership, armies } = SNAPS[stepT];
  const cities = citySetAt(stepT);
  for (let i = 0; i < N; i++) {
    const tile = CELLS[i];
    const o = ownership[i];
    setTileOwnership(tile, o);
    if (o === -2) {
      setTileIcon(tile, 'mountain');
      setTileArmy(tile, 0);
    } else if (isGeneralAt(i, stepT)) {
      setTileIcon(tile, 'crown');
      setTileArmy(tile, armies[i]);
    } else if (cities.has(i)) {
      setTileIcon(tile, 'city');
      setTileArmy(tile, armies[i]);
      if (o === -1) tile.classList.add('neutral-city');
    } else {
      setTileIcon(tile, null);
      setTileArmy(tile, armies[i]);
      if (armies[i] > 0) {
        tile.classList.add('with-army')
      }
      else {
        tile.classList.remove('with-army')
      }
    }
  }
}

function renderLeaderboard(stepT) {
  const { army, tiles } = AGGREGATES[stepT];
  for (let p = 0; p < NUM_PLAYERS; p++) {
    const row = LB_ROWS[p];
    row.classList.toggle('dead', !isPlayerAlive(p, stepT));
    row.querySelector('.army').textContent = army[p];
    row.querySelector('.land').textContent = tiles[p];
    row.querySelector('.skull').textContent = hasKillBy(p, stepT) ? '☠️' : '';
  }

  // Sort: alive first by (army desc, land desc, player-index asc); dead at
  // the bottom in death order, with the first-to-die at the very bottom.
  const deaths = DATA.static.general_death_t;
  const initGens = DATA.static.initial_generals;
  const deathRank = p => (initGens[p] < 0 ? -1 : (deaths[p] ?? -1));

  const order = [...Array(NUM_PLAYERS).keys()].sort((a, b) => {
    const aliveA = isPlayerAlive(a, stepT);
    const aliveB = isPlayerAlive(b, stepT);
    const hasKillA = hasKillBy(a, stepT);
    const hasKillB = hasKillBy(b, stepT);
    if (hasKillA !== hasKillB) return hasKillA ? -1 : 1;
    if (aliveA !== aliveB) return aliveA ? -1 : 1;
    if (aliveA) {
      if (army[b]  !== army[a])  return army[b]  - army[a];
      if (tiles[b] !== tiles[a]) return tiles[b] - tiles[a];
      return a - b;
    }
    return deathRank(b) - deathRank(a);
  });
  document.getElementById('lb-body').append(...order.map(p => LB_ROWS[p]));
}

function renderEvents(stepT) {
  const root = document.getElementById('events');
  const evs = DATA.ui_events.filter(e => e.t <= stepT);
  root.innerHTML = evs.map(eventHTML).join('');
}

function eventLog(e, content, className) {
  className = className || '';
  return `<div class="event ${className}">${content} <span class="t">${e.t}</span></div>`;
}
function nameWithSwatch(playerIndex) {
  const name = DATA.static.usernames[playerIndex];
  const color = COLORS[playerIndex];
  return `<span class="swatch" style="background: ${color}"></span>` + escapeHtml(name);
}

function eventHTML(e) {
  if (e.kind === 'capture') {
    return eventLog(e, `${nameWithSwatch(e.captor)} captured ${nameWithSwatch(e.captured)}`);
  }
  if (e.kind === 'surrender') {
    return eventLog(e, `${nameWithSwatch(e.player)} surrendered.`);
  }
  if (e.kind === 'win') {
    return eventLog(e, `${nameWithSwatch(e.player)} wins! `, 'win');
  }
  return '';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderHeader(stepT) {
  const turn = Math.floor(stepT / 2);
  const dot = stepT % 2 === 1 ? '.' : '';
  document.getElementById('step-readout').textContent = `Turn ${turn}${dot}`;
}

function render(stepT) {
  renderBoard(stepT);
  renderLeaderboard(stepT);
  renderEvents(stepT);
  renderHeader(stepT);
}

// ============================================================================
// Controls
// ============================================================================

function setStep(newT) {
  t = Math.max(0, Math.min(T_MAX, newT | 0));
  render(t);
  document.getElementById('jump').value = t;
}

document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.step;
    if (v === 'start') setStep(0);
    else if (v === 'end') setStep(T_MAX);
    else setStep(t + parseInt(v, 10));
  });
});

document.getElementById('jump').max = T_MAX;
document.getElementById('jump').addEventListener('change', e => {
  setStep(parseInt(e.target.value, 10) || 0);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case 'a':          setStep(t - 1);  e.preventDefault(); break;
    case 'ArrowLeft':  setStep(t - 1);  e.preventDefault(); break;

    case 'd':          setStep(t + 1);  e.preventDefault(); break;
    case 'ArrowRight': setStep(t + 1);  e.preventDefault(); break;

    case 'w':          setStep(t - 25); e.preventDefault(); break;
    case 'ArrowUp':    setStep(t - 25); e.preventDefault(); break;

    case 's':          setStep(t + 25); e.preventDefault(); break;
    case 'ArrowDown':  setStep(t + 25); e.preventDefault(); break;
  }
});

render(0);
</script>
</body>
</html>
