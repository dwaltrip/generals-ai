[project]
name = "generals-ai-workspace"
version = "0.0.0"
description = "generals-ai monorepo workspace root"
requires-python = ">=3.11.2"

[tool.uv]
package = false

[tool.uv.workspace]
members = ["replay-collector", "replay-parser"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
